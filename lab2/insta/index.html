<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="logo.png">
</head>
<body>
    <div class="container">
        <div class="left">
            <img src="logo2.png" alt="" id="instlg">
            <h2>See everyday moments from your <span>close friends</span></h2>
            <img src="faces.png" alt="" id="faceslg">
        </div>

        <div class="right">
            <h2>Log into Instagram</h2>
            <div class="form-container"></div>
                <form action="">
                    <input type="text" placeholder="Mobile number, username or email">
                    <input type="password" placeholder="Password">
                    <button class="btn" id="a">Log in</button>
                    <button class="btn" id="b">Forgot password?</button>
                    <button class="btn" id="c">Log in with Facebook</button>
                    <button class="btn" id="d">Create new account</button>
                    <img src="Meta.png" alt="">

                </form>

        </div>

    </div>
    
    <div class="down">
            <p>Meta About Blog Jobs Help API Privacy Terms Locations Instagram Lite Meta AI Threads Contact Uploading & Non-Users Meta Verified</p>
            <p>English © 2026 Instagram from Meta</p>
        </div>

    
</body>
</html>
